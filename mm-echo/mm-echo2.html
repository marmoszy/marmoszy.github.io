function openBlob() {
    const request = indexedDB.open("FileStorageDB", 1);
    request.onsuccess = (event) => {
        const db = event.target.result;
        const transaction = db.transaction("files", "readonly");
        const store = transaction.objectStore("files");
        const getRequest = store.get("shared-file");
        getRequest.onsuccess = () => {
          const data = getRequest.result;
          if (!data) return console.error("File not found in IndexedDB");
          const file = new File([data.blob], data.name, { type: data.blob.type });
          const dataTransfer = new DataTransfer();
          dataTransfer.items.add(file);
          const fileInput = document.getElementById("imageLoader");
          fileInput.files = dataTransfer.files;
          fileInput.dispatchEvent(new Event('change', { bubbles: true }));
          console.log("File successfully injected into input element!");
        };
   };
}

function createDataTexture(str) {
    const points = str.split(';').map(pair => {
        const [x, y] = pair.trim().split(',').map(Number);
        return { x, y };
    });
    const numPoints = points.length;
    const data = new Float32Array(numPoints * 4);
    for (let i = 0; i < numPoints; i++) {
        data[i * 4 + 0] = points[i].x; // R = czyste X ze świata
        data[i * 4 + 1] = points[i].y; // G = czyste Z ze świata
        data[i * 4 + 2] = 0.0;
        data[i * 4 + 3] = 1.0;
    }
    const texture = new THREE.DataTexture(data, numPoints, 1, THREE.RGBAFormat, THREE.FloatType);
    texture.needsUpdate = true;
    return { texture, numPoints };
}

// --- Shaders ---

const vertexShader = `
    varying vec2 vUv;
    uniform sampler2D u_dataTexture;
    uniform float u_numPoints;
    uniform float u_botOffset;

    void main() {
        vUv = uv; 
        float pointIndex = uv.x * (u_numPoints - 1.0);
        pointIndex = clamp(pointIndex, 0.0, u_numPoints - 1.0);
        float texelX = (pointIndex + 0.5) / u_numPoints;
        vec4 dataSample = texture2D(u_dataTexture, vec2(texelX, 0.5));
        float currentWorldX = dataSample.r;
        float topEdge = dataSample.g;
        float yPositionInMesh = uv.y; 
        float finalY = mix(-u_botOffset, 0.0, yPositionInMesh);
        float finalZ = topEdge;
        vec3 deformedPosition = vec3(currentWorldX, finalY, finalZ);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(deformedPosition, 1.0);
    }
`;

const fragmentShader = `
    varying vec2 vUv;
    uniform sampler2D u_imageTexture;
    uniform float u_opacity;
    void main() {
        vec4 texColor = texture2D(u_imageTexture, vUv);
        gl_FragColor = vec4(texColor.rgb, texColor.a * u_opacity);
    }
`;

const fragmentShader0 = `
    varying vec2 vUv;
    uniform sampler2D u_imageTexture;
    void main() {
        gl_FragColor = texture2D(u_imageTexture, vUv);
    }
`;

});

    const deltaX = e.clientX - previousMousePosition.x;
    const deltaY = e.clientY - previousMousePosition.y;
    if (e.shiftKey) {
        const mouseZoomSpeed = 0.1;
        camera.fov += deltaY * mouseZoomSpeed; 
        camera.fov = THREE.MathUtils.clamp(camera.fov, 10, 75);
        camera.updateProjectionMatrix();
    } else {
        rotationY += deltaX * 0.01;
        rotationX += deltaY * 0.01;        
        mainGroup.rotation.y = rotationY;
        mainGroup.rotation.x = rotationX;
    }   
    previousMousePosition = { x: e.clientX, y: e.clientY };
});

});

    let zoomSpeed = 0.05;

function updatePathLine(str) {

    const lineVertices = [];

    // Generowanie punktów dla gładkiej czarnej linii
    for(let i = 0; i <= 200; i++) {

        let yTarget = 0.0;

        for (let j = 0; j < punktyDlaLinii.length - 1; j++) {
            if (xTarget >= punktyDlaLinii[j].x && xTarget <= punktyDlaLinii[j+1].x) {
                const t = (xTarget - punktyDlaLinii[j].x) / (punktyDlaLinii[j+1].x - punktyDlaLinii[j].x);
                yTarget = THREE.MathUtils.lerp(punktyDlaLinii[j].y, punktyDlaLinii[j+1].y, t);
                break;
            }
        }
        // Przeliczenie na pozycję w świecie 3D (identycznie jak w shaderze)
        lineVertices.push((xTarget - 0.5) * meshWidth, yTarget, 0.005);
    }
    
    // Nadpisanie bufora pozycji nowymi współrzędnymi
    lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(lineVertices, 3));

function applyNewData(imageElement, curveString) {
debugger;
    let points = parsePointsToObjects(curveString);
    if (!points || points.length === 0) return;
    const targetCount = 201; // 200 segments -> 201 vertices
    const sampledPoints = [];
    const totalPoints = points.length;   
    for (let i = 0; i < targetCount; i++) {
        //const index = Math.floor((i * (totalPoints - 1)) / (targetCount - 1));
        //sampledPoints.push(points[index]);
        const t = i / (targetCount - 1);
        const rawIndex = t * (totalPoints - 1);
        const index = Math.floor(rawIndex);
        const nextIndex = Math.min(index + 1, totalPoints - 1);
        const weight = rawIndex - index;
        const interX = points[index].x + (points[nextIndex].x - points[index].x) * weight;
        const interY = points[index].y + (points[nextIndex].y - points[index].y) * weight;
        sampledPoints.push({x:interX,y:interY});
    }
    const data = new Float32Array(targetCount * 4);
    for (let i = 0; i < targetCount; i++) {
        data[i * 4 + 0] = sampledPoints[i].x; // x
        data[i * 4 + 1] = sampledPoints[i].y; // z 
        data[i * 4 + 2] = 0.0;
        data[i * 4 + 3] = 1.0;
    }
    const newBufferTexture = new THREE.DataTexture(data, targetCount, 1, THREE.RGBAFormat, THREE.FloatType);
    newBufferTexture.minFilter = THREE.NearestFilter;
    newBufferTexture.magFilter = THREE.NearestFilter;
    newBufferTexture.wrapS = THREE.ClampToEdgeWrapping;
    newBufferTexture.wrapT = THREE.ClampToEdgeWrapping;
    newBufferTexture.needsUpdate = true;
    const newImageTexture = new THREE.Texture(imageElement); 
    newImageTexture.needsUpdate = true;
    const instanceMaterial = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        uniforms: {
            u_imageTexture: { value: newImageTexture },
            u_dataTexture: { value: newBufferTexture },
            u_numPoints: { value: targetCount },
            u_botOffset: { value: dolnyOffset },
            u_opacity: { value: 0.75}
        },
        side: THREE.DoubleSide, 
        transparent: true
    });
    const geometry = new THREE.PlaneGeometry(meshWidth, 1.0, 200, 1);
    const newMesh = new THREE.Mesh(geometry, instanceMaterial);
    mainGroup.add(newMesh);
    if (typeof createPathLine === 'function') {
        const pathLine = createPathLine(curveString);
        mainGroup.add(pathLine);
    }
    const line0 = thLine([[points[0].x,0,points[0].y],[points[0].x,0.2,points[0].y]],0x008080);
    mainGroup.add(line0);
}

function reducePointsSample(points, targetCount) { // decimation
    const sampled = [];
    const totalPoints = points.length;
    sampled.push(points[0]);
    for (let i = 1; i < targetCount - 1; i++) {
        const index = Math.floor((i * (totalPoints - 1)) / (targetCount - 1));
        sampled.push(points[index]);
    }
    sampled.push(points[totalPoints - 1]);
    return sampled;
}

function thLine(pts,col) {
    const points = [];
    points.push(new THREE.Vector3(pts[0][0], pts[0][1], pts[0][2]));
    points.push(new THREE.Vector3(pts[1][0], pts[1][1], pts[1][2]));
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({color: col,linewidth:1});
    const line = new THREE.Line(geometry, material);
    return line;
}

function generateEchogramImage(pingsData, th) {
    return new Promise((resolve) => {
        if (!pingsData || pingsData.length === 0) {
            resolve(new Image()); // Zwróć pusty obraz, jeśli brak danych
            return;
        }

        const w = pingsData.length;
        const h = Math.max(...pingsData.map(p => p.length));

        // Używamy ukrytego elementu canvas do wyrenderowania obrazu w pamięci
        const offscreenCanvas = document.createElement('canvas');
        offscreenCanvas.width = w;
        offscreenCanvas.height = h;
        const ctx = offscreenCanvas.getContext('2d');
        const imgData = ctx.createImageData(w, h);

        for (let j = 0; j < w; j++) {
            for (let i = 0; i < h; i++) {
                let colorIdx = 0;
                if (i < pingsData[j].length) {
                    const val = pingsData[j][i];
                    // Logika kolorów 64-paletowa
                    colorIdx = val >= 0 ? 63 : (val > th ? Math.floor((val + 128) / 2) : 0);
                }
                const pIdx = (i * w + j) * 4;
                colorIdx = Math.max(0, Math.min(63, colorIdx));
                
                imgData.data[pIdx]     = pal[colorIdx * 3];
                imgData.data[pIdx + 1] = pal[colorIdx * 3 + 1];
                imgData.data[pIdx + 2] = pal[colorIdx * 3 + 2];
                imgData.data[pIdx + 3] = 255; // Alpha
            }
        }
        ctx.putImageData(imgData, 0, 0);
        const img = new Image();
        img.onload = () => {
            resolve(img);
        };
        img.src = offscreenCanvas.toDataURL();
    });
}

function processDGxLogic(buffer, targetCh, th) {
    const dv = new DataView(buffer);
    let offset = 0;
    let pings = [];
    const chStr = targetCh.toString();
    let navStrCollection = []; 
    const textDecoder = new TextDecoder("utf-8");

    // W formacie .dg/.dgn nagłówek długości ma 4 bajty (UInt32)
    while (offset + 4 <= dv.byteLength) {
        const size = dv.getUint32(offset, true); // ZMIANA: getUint32 zamiast getUint16
        const blockStart = offset + 4;            // ZMIANA: blockStart przesunięty o 4 bajty
        
        if (blockStart + size > dv.byteLength) {
            console.warn("File error in block at offset:", offset);
            break;
        }
        
        if (size >= 2) {
            const t1 = String.fromCharCode(dv.getUint8(blockStart));
            const t2 = String.fromCharCode(dv.getUint8(blockStart + 1));
            
            // --- Telegram nawigacyjny 'GL' ---
            if (t1 === 'G' && t2 === 'L') { 
                const stringOffset = blockStart + 2;
                const stringLength = size - 2;
                if (stringLength > 0) {
                    const stringBuffer = new Uint8Array(buffer, stringOffset, stringLength);
                    const cleanString = textDecoder.decode(stringBuffer).trim();
                    const parts = cleanString.split(",");
                    let latDec = null, lonDec = null;
                    
                    const lonMatch = parts[4] ? parts[4].match(/^(\d{3})(\d{2}\.\d+)$/) : null;
                    if (lonMatch) {
                        const d = parseFloat(lonMatch[1]);
                        const m = parseFloat(lonMatch[2]);
                        lonDec = d + (m / 60);
                        if (parts[5] === "W") lonDec = -lonDec;
                    }
                    const latMatch = parts[2] ? parts[2].match(/^(\d{2})(\d{2}\.\d+)$/) : null;
                    if (latMatch) {
                        const d = parseFloat(latMatch[1]);
                        const m = parseFloat(latMatch[2]);
                        latDec = d + (m / 60);
                        if (parts[3] === "S") latDec = -latDec;
                    }
                    navStrCollection.push("" + lonDec + " " + latDec);
                }
            } 
            // --- Telegram echogramu 'Q' + numer kanału ---
            else if (t1 === 'Q' && t2 === chStr) {  
                if (size >= 44) {
                    const pelCo = dv.getUint32(blockStart + 24, true);
                    let y = [];
                    const maxSamplesInBlock = Math.floor((size - 44) / 2);
                    const samplesToRead = Math.min(pelCo, maxSamplesInBlock);
                    
                    for (let i = 0; i < samplesToRead; i++) {
                        const sampleOffset = blockStart + 44 + (i * 2);
                        if (sampleOffset + 2 <= dv.byteLength) {
                            const wVal = dv.getInt16(sampleOffset, true);
                            const val = 3.0103 * wVal / 256;
                            y.push(val > th ? val : th);
                        }
                    }
                    if (y.length > 0) pings.push(y);
                }
            }
        }
        
        // ZMIANA: Przesunięcie o 4 bajty nagłówka długości + rozmiar payloadu
        offset += (4 + size);
    }
    
    const navs = navStrCollection.join('\n');
    return { pings, navs };
}

function processEK5Logic(buffer, targetCh, th) {
    const dv = new DataView(buffer);
    let offset = 0;
    let pings = [];
    const chStr = targetCh.toString();
    let navStrCollection = []; 
    // Poprawiono dekoder na "windows-1252" lub "ascii", EK500 nie używa natywnie wielobajtowego UTF-8
    const textDecoder = new TextDecoder("windows-1252");

    while (offset + 2 <= dv.byteLength) {
        const size = dv.getUint16(offset, true);
        const blockStart = offset + 2;
        if (blockStart + size > dv.byteLength) {
            console.warn("File error in block at offset:", offset);
            break;
        }
        if (size >= 2) {
            const t1 = String.fromCharCode(dv.getUint8(blockStart));
            const t2 = String.fromCharCode(dv.getUint8(blockStart + 1));
            if (t1 === 'G' && t2 === 'L') { 
                const stringOffset = blockStart + 2;
                const stringLength = size - 2;
                if (stringLength > 0) {
                    const stringBuffer = new Uint8Array(buffer, stringOffset, stringLength);
                    const cleanString = textDecoder.decode(stringBuffer).trim();
                    const parts = cleanString.split(",");
                    let latDec = null, lonDec = null;
                    
                    const lonMatch = parts[4] ? parts[4].match(/^(\d{3})(\d{2}\.\d+)$/) : null;
                    if (lonMatch) {
                        const d = parseFloat(lonMatch[1]);
                        const m = parseFloat(lonMatch[2]);
                        lonDec = d + (m / 60);
                        if (parts[5] === "W") lonDec = -lonDec;
                    }
                    const latMatch = parts[2] ? parts[2].match(/^(\d{2})(\d{2}\.\d+)$/) : null;
                    if (latMatch) {
                        const d = parseFloat(latMatch[1]);
                        const m = parseFloat(latMatch[2]);
                        latDec = d + (m / 60);
                        if (parts[3] === "S") latDec = -latDec;
                    }
                    
                    if (latDec !== null && lonDec !== null) {
                        navStrCollection.push(lonDec + " " + latDec);
                    }
                }
            } else if (t1 === 'Q' && t2 === chStr) {  
                if (size >= 44) {
                    const pelCo = dv.getUint32(blockStart + 24, true);
                    let y = [];
                    const maxSamplesInBlock = Math.floor((size - 44) / 2);
                    const samplesToRead = Math.min(pelCo, maxSamplesInBlock);
                    for (let i = 0; i < samplesToRead; i++) {
                        const sampleOffset = blockStart + 44 + (i * 2);
                        if (sampleOffset + 2 <= dv.byteLength) {
                            const wVal = dv.getInt16(sampleOffset, true);
                            const val = 3.0103 * wVal / 256;
                            y.push(val > th ? val : th);
                        }
                    }
                    if (y.length > 0) pings.push(y);
                }
            }
        }
        offset += (2 + size);
    }
    const navs = navStrCollection.join('\n');
    return { pings, navs };
}

function processDT4Logic(buffer, targetCh, th) {
    const dv = new DataView(buffer);
    let offset = 0;
    let pings = [];
    let navs = "";
    let st = {
        tm: 0, sa: 0, sv: 0, pw: 0, ch: 0, ib: 0, f: 0, sl: 0, rs: 0, sr: 1, ab: 0, sv0: 1480
    };
    while (offset + 4 <= dv.byteLength) {
        const size = dv.getUint16(offset, true);
        const type = dv.getInt16(offset + 2, true);
        const b = offset + 4; // Start danych bloku
        const dataStart = offset + 4;
        if (b + size + 2 > dv.byteLength) break;
        if (type === 30) {         // --- TYP 30: HEADER ---
            st.sv = dv.getUint16(b + 2, true);  // 1446
            st.tm = dv.getInt16(b + 4, true);   // 1000
            st.sa = dv.getUint16(b + 6, true);  // 0
            st.pw = dv.getUint16(b + 8, true);  // 0
        }
		else if (type === 18) {    // --- TYP 18: CHANNEL DESCRIPTOR ---
		    st.ch  = dv.getUint16(b + 0, true);   // [0] S
		    st.pc  = dv.getInt32(b + 2, true);    // [1] l
		    st.spp = dv.getUint16(b + 6, true);   // [2] S
		    st.sp  = dv.getUint16(b + 8, true);   // [3] S
		    st.et  = dv.getUint16(b + 10, true);  // [4] S
		    st.pl  = dv.getUint16(b + 12, true);  // [5] S
		    st.pr  = dv.getUint16(b + 14, true);  // [6] S
		    st.ib  = dv.getUint16(b + 16, true);  // [7] S -> 55
		    st.dl  = dv.getUint16(b + 18, true);  // [8] S
		    st.th  = dv.getInt16(b + 20, true);   // [9] s
		    let sn = "";
		    for (let i = 0; i < 8; i++) sn += String.fromCharCode(dv.getUint8(b + 24 + i));
		    st.sn = sn.trim(); // offset 24-31
		    st.sl = dv.getInt16(b + 80, true); 
		    st.rs = dv.getInt16(b + 86, true);
		    st.wsl = dv.getInt16(b + 92, true);
		    st.wrs = dv.getInt16(b + 98, true);
		    st.tt   = dv.getUint16(b + 98, true);  // [30] S -> 4
		    st.f    = dv.getUint32(b + 100, true); // [31] L -> 208000
		    st.alcs = dv.getUint16(b + 104, true); // [32] S
		    st.atcs = dv.getUint16(b + 106, true); // [33] S
		    st.alpo = dv.getInt8(b + 108);         // [34] c
		    st.atpo = dv.getInt8(b + 109);         // [35] c
		    st.alao = dv.getUint16(b + 110, true); // [36] S
		    st.atao = dv.getUint16(b + 112, true); // [37] S
		    st.bwj  = dv.getUint8(b + 114);        // [38] C -> 62
		    st.bwn  = dv.getUint8(b + 115);        // [39] C -> 62
		    st.sr   = dv.getUint32(b + 116, true); // [40] L -> 41667
		    st.wbwj = dv.getUint8(b + 120);        // [41] C
		    st.wbwn = dv.getUint8(b + 121);        // [42] C
		    st.ab = getAbsorp(st.tm / 100, st.sa / 100, st.f / 1000);
		    st.bpf = bp_factor(st.bwj / 10, st.bwn / 10);
		    st.sv0 = 1400 + st.sv / 400;
		    st.sv1 = 1410 + 4.21 * (st.tm / 100) - 0.037 * Math.pow(st.tm / 100, 2) + 1.1 * (st.sa / 100);
		    st.sv2 = svel2(st.tm / 100, st.sa / 100);
		    st.sv3 = getSvel(st.tm / 100, st.sa / 100);
	      }
        else if (type === 17) { // || type === 15 || type === 14) { // GPS NMEA DATA
            let textStart = (type === 15) ? b + 10 : b;
            let textLength = size - (textStart - b);          
            let rawString = "";
            for (let i = 0; i < textLength; i++) {
                let charCode = dv.getUint8(textStart + i);
                if (charCode === 0) break; 
                rawString += String.fromCharCode(charCode);
            }
            navs += processNmeaText(rawString);
        }
	      else if ([5, 21, 28, 29].includes(type)) { // --- PING DATA (29-Split Beam) ---
	          let ch, ping_no, w = [];
	          let currentDataStart = dataStart;
	          if (type === 5) {
	              ch = 1;
	              ping_no = dv.getUint32(currentDataStart, true);
	              for (let i = currentDataStart + 4; i < currentDataStart + size + 2; i += 2) {
	                  w.push(dv.getUint16(i, true));
	              }
	          } else {
	              ch = dv.getUint16(currentDataStart, true);
	              ping_no = dv.getUint32(currentDataStart + 2, true);
	              //ptime = dv.getUint32(currentDataStart + 6, true);
	              //N = dv.getUint16(currentDataStart + 10, true);
	              for (let i = currentDataStart + 12; i < currentDataStart + size + 2; i += 2) {
	                  w.push(dv.getUint16(i, true));
	              }
	          }
	          if (ch === targetCh) {
	              let decoded = [];
	              if (type < 28) decoded = RleWords(w);
	              else if (type === 28) decoded = RleWords2(w);
	              else if (type === 29) decoded = RleWords3(w);
	              let y = [];
	              // Przetwarzanie próbek na wartości dB (zgodnie z krokiem pętli w Perlu)
	              let step = (type === 28 || type === 29) ? 2 : 1;          
	              for (let i = 0; i < decoded.length; i += step) {
	                  let sampleIdx = i / step;
	                  let depth = (sampleIdx + st.ib) * st.sv0 / 2 / st.sr;
	                  let amplitude = decoded[i];              
	                  let val = 20 * Math.log10(amplitude * depth * depth + 1e-10) 
	                            + 2 * st.ab * depth - st.sl/10 - st.rs/10 - st.pw/10;
	                  if (val < th) val = th;
	                  y.push(val);
	              }
	              if (y.length > 0) pings.push(y);
	          }
	      }
		  offset += (size + 6);
    }
    return {pings,navs};
}

function parseNmeaCoord(coordStr, dir) {
    if (!coordStr || !dir) return null;
    const dotIdx = coordStr.indexOf('.');
    if (dotIdx === -1) return null;
    const degLen = (dir === 'N' || dir === 'S') ? 2 : 3;
    const d = parseFloat(coordStr.substring(0, degLen));
    const m = parseFloat(coordStr.substring(degLen));
    let l = d + (m / 60);
    if (dir === 'S' || dir === 'W') {
        l = -l;
    }
    return l;
}
    function processNmeaText(textBlock) {
	var navs="";
        const lines = textBlock.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
        for (const line of lines) {
            if (line.includes('$GPGGA') || line.includes('$GPRMC')) {
                const parts = line.split(',');
                if (line.includes('GGA') && parts.length >= 6) {
                    // Format: $GPGGA, time, lat, N, lon, E, ...
                    var lat = parseNmeaCoord(parts[2], parts[3]).toFixed(8);
                    var lon = parseNmeaCoord(parts[4], parts[5]).toFixed(8);
		    navs += `${lon} ${lat}\n`
                }

                    var lon = parseNmeaCoord(parts[5], parts[6]).toFixed(8);
		    navs += `${lon} ${lat}\n`
                }
*/            }
        }
        return navs;
    }

// --- RLE decoders ---

function RleWords(w) {
    let f = [];
    for (let i = 0; i < w.length; i++) {
        if ((w[i] & 0xF000) === 0xF000) {
            let l = (w[i] & 0xFF) + 2;
            while (l--) f.push(0);
        } else {
            let m = w[i] & 0x0FFF;
            let e = (w[i] & 0xF000) >> 12;
            f.push(e === 0 ? m : (m + 4096) << (e - 1));
        }
    }
    return f;
}
function RleWords2(w) {
    let f = [];
    for (let i = 0; i < w.length; i++) {
        if ((w[i] & 0xF000) === 0xF000) {
            let l = 2 * ((w[i] & 0xFF) + 2);
            while (l--) f.push(0);
            i++; 
        } else {
            let m = w[i] & 0x0FFF;
            let e = (w[i] & 0xF000) >> 12;
            f.push(e === 0 ? m : (m + 4096) << (e - 1));
        }
    }
    return f;
}
function RleWords3(w) {
    // Identyczna jak RleWords2, ale zachowuje kąty (co drugi element)
    let f = [];
    for (let i = 0; i < w.length; i++) {
        if ((w[i] & 0xF000) === 0xF000) {
            let l = 2 * ((w[i] & 0xFF) + 2);
            while (l--) f.push(0);
            i++; 
        } else {
            let m = w[i] & 0x0FFF;
            let e = (w[i] & 0xF000) >> 12;
            f.push(e === 0 ? m : (m + 4096) << (e - 1));
            f.push(w[++i]); // Along/Athwart
        }
    }
    return f;
}

// --- Utils ---

function bp_factor(bwj, bwn) {
    return 0.00011010832 * bwj / 2 * bwn / 2; // 10^(-3.16)/2pi
}
function getAbsorp(tm, sa, f) {
    // Perlowe log(10) to logarytm naturalny z 10
    const ft = 21.9 * Math.exp(Math.log(10) * (6 - 1520 / (tm + 273)));
    return (0.0186 * f * f * ft * sa / (ft * ft + f * f) + 0.0268 * f * f / ft) / 914.4;
}
function getSvel(tm, sa) {
    return 1449.2 + (4.6 + (-0.055 + 0.00029 * tm) * tm) * tm + (1.34 - 0.010 * tm) * (sa - 35) + 0.016 * 1;
}
function svel2(tm, sa) {
    let tmp = tm - 10;
    let ss = 1492.9 + 3 * tmp - 0.006 * tmp * tmp;
    tmp -= 8;
    ss += (-0.04 * tmp * tmp + 1 / 61);
    let sal = sa - 35;
    if (sa !== 0) {
        ss += 1.2 * sal - 0.01 * tmp * sal;
    }
    return ss;
}
function svel4(t, s, p) {
    p = p / 10.0;
    const sr = Math.sqrt(s);    
    let d = 1.727E-3 - 7.9836E-6 * p;
    let a1 = 7.3637E-5 + 1.7945E-7 * t;
    let a0 = -1.922E-2 - 4.42E-5 * t;
    let b = a0 + a1 * p;    
    let a3 = (-3.389E-13 * t + 6.649E-12) * t + 1.100E-10;
    let a2 = ((7.988E-12 * t - 1.6002E-10) * t + 9.1041E-9) * t - 3.9064E-7;
    a1 = (((-2.0122E-10 * t + 1.0507E-8) * t - 6.4885E-8) * t - 1.2580E-5) * t + 9.4742E-5;
    a0 = (((-3.21E-8 * t + 2.006E-6) * t + 7.164E-5) * t - 1.262E-2) * t + 1.389;
    let a = ((a3 * p + a2) * p + a1) * p + a0;    
    a3 = (-2.3643E-12 * t + 3.8504E-10) * t - 9.7729E-9;
    a2 = (((1.0405E-12 * t - 2.5335E-10) * t + 2.5974E-8) * t - 1.7107E-6) * t + 3.1260E-5;
    a1 = (((-6.1185E-10 * t + 1.3621E-7) * t - 8.1788E-6) * t + 6.8982E-4) * t + 0.153563;
    a0 = ((((3.1464E-9 * t - 1.47800E-6) * t + 3.3420E-4) * t - 5.80852E-2) * t + 5.03711) * t + 1402.388;
    let c = ((a3 * p + a2) * p + a1) * p + a0;    
    return c + (a + b * sr + d * s) * s;
}

    handleRasterImage: function(file, curve) {

    },
    handleCustomFormat: function(file) {     // returning Promise with img and curve
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const arrayBuffer = event.target.result; 
                    const targetCh = 1;

                    if (file.name.endsWith('.ek5')) {

                    } else if (dgx.test(file.name)) {
                        data = processDGxLogic(arrayBuffer, targetCh, th);
                    } else if (file.name.endsWith('.raw')) {
                        data = processEK60AndEK80Logic(arrayBuffer, targetCh, th);
                    } else if (file.name.toLowerCase().endsWith('.dt4')) {
                        data = processDT4Logic(arrayBuffer, targetCh, th);
                    } else {
                        console.log(`File format not supported: ${file.name}`);
                    }
                    if(data) {
                        var curve = data.navs.replace(/\r?\n/g, ";").replace(/ +/g, ",");

                }

function mapCurveStringWithAspectRatio(cleanString, globalBounds = null) {
debugger;
    const values = cleanString.split(/[;,]/).filter(val => val !== "").map(Number);
    const points = [];
    for (let i = 0; i < values.length; i += 2) {
        if (!isNaN(values[i]) && !isNaN(values[i+1])) {
            points.push({ x: values[i], z: values[i+1] });
        }
    }
    if (points.length === 0) return "";
    let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
    if (globalBounds) {
        minX = globalBounds.minX;
        maxX = globalBounds.maxX;
        minZ = globalBounds.minZ;
        maxZ = globalBounds.maxZ;
    } else {
        for (const p of points) {
            if (p.x < minX) minX = p.x;
            if (p.x > maxX) maxX = p.x;
            if (p.z < minZ) minZ = p.z;
            if (p.z > maxZ) maxZ = p.z;
        }
    }
    const rangeX = maxX - minX;
    const rangeZ = maxZ - minZ;
    const maxRange = Math.max(rangeX, rangeZ) || 1;
    const offsetX = (maxRange - rangeX) / 2;
    const offsetZ = (maxRange - rangeZ) / 2;
    const mappedPairs = points.map(p => {
        //const mappedX =   -2 + (((p.x - minX) + offsetX) / maxRange) * 4;
        //const mappedZ = -(-2 + (((p.z - minZ) + offsetZ) / maxRange) * 4);
        const mappedX = (rangeX === 0) 
            ? p.x 
            : -2 + (((p.x - minX) + offsetX) / maxRange) * 4;
        const mappedZ = (rangeZ === 0)
            ? -p.z
            : -(-2 + (((p.z - minZ) + offsetZ) / maxRange) * 4);
        return `${mappedX.toFixed(8)},${mappedZ.toFixed(8)}`;
    });
    return mappedPairs.join(";");
}

async function gunzip(arrayBuffer) {
    const ds = new DecompressionStream("gzip");
    const decompressed = new Response(
        new Response(arrayBuffer).body.pipeThrough(ds)
    );
    return await decompressed.arrayBuffer();
}
function untar(arrayBuffer) {
    const bytes = new Uint8Array(arrayBuffer);
    const files = [];
    let offset = 0;
    while (offset < bytes.length) {
        const name = readString(bytes, offset, 100);
        if (!name) break;
        const sizeOctal = readString(bytes, offset + 124, 12).trim();
        const size = parseInt(sizeOctal, 8);
        const fileStart = offset + 512;
        const fileEnd = fileStart + size;
        const fileBytes = bytes.slice(fileStart, fileEnd);
        files.push({name, arrayBuffer:fileBytes.buffer});
        const blocks = Math.ceil(size / 512);
        offset = fileStart + blocks * 512;
    }
    return files;
}
function readString(bytes, start, length) {
    let out = "";
    for (let i = start; i < start + length; i++) {
        if (bytes[i] === 0) break;
        out += String.fromCharCode(bytes[i]);
    }
    return out;
}

document.getElementById('imageLoader').addEventListener('change', async function(e) {
    if (!e.target.files || e.target.files.length === 0) return;
    const txtFiles = new Map();
    const imageFiles = new Map();
    const customFiles = [];
    const ek5ProcessedData = new Map(); 

    function getNameCore(filepath) {
        const filename = filepath.split('/').pop();
        return filename.substring(0, filename.lastIndexOf('.')) || filename;
    }
    const isTarGz = e.target.files.length === 1 && 
                    (e.target.files[0].name.endsWith('.tar.gz') ||
                     e.target.files[0].name.endsWith('.tgz'));
    try {
        if (isTarGz) {
            const archiveFile = e.target.files[0];
            const archiveBuffer = await archiveFile.arrayBuffer();
            const unzippedBuffer = await gunzip(archiveBuffer);
            const extractedFiles = untar(unzippedBuffer);
            const textDecoder = new TextDecoder("utf-8");
            for (const file of extractedFiles) {
                const core = getNameCore(file.name);               
                if (file.name.endsWith('.txt')) {
                    const rawText = textDecoder.decode(file.arrayBuffer).trim();
                    const cleanStr = rawText.replace(/\r?\n/g, ";").replace(/ +/g, ",");
                    txtFiles.set(core, cleanStr);
                } else { //if (file.name.endsWith('.png') || file.name.endsWith('.jpg') || file.name.endsWith('.jpeg')) {
                    const imgBlob = new Blob([file.arrayBuffer], { type: "image/png" });
                    imageFiles.set(core, imgBlob);
                }
            }
        } else {
            const rawTxtDataMap = new Map();
            for (const file of e.target.files) {
                const core = getNameCore(file.name);
		const dgx = /\.dg.$/i;
                if (dgx.test(file.name) || file.name.endsWith('.ek5') || file.name.endsWith('.raw')||file.name.toLowerCase().endsWith('.dt4')) {
                    customFiles.push(file); // for async processing
                } else if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                    rawTxtDataMap.set(core, file);
                } else if (file.type.startsWith('image/')) {
                    imageFiles.set(core, file);
                } else {
                    console.warn(`File format not known: ${file.name}.`);
                }
            }
            if (customFiles.length > 0) {             // async processing  (.ek5, .raw) 
                const ek5Promises = customFiles.map(async (file) => {
                    const core = getNameCore(file.name);
                    try {
                        const result = await FileParsers.handleCustomFormat(file);
                        ek5ProcessedData.set(core, result);
                    } catch (err) {
                        console.error(`Error parsing ${file.name}:`, err);
                    }
                });
                await Promise.all(ek5Promises);
            }
            if (rawTxtDataMap.size > 0) {
                const txtPromises = Array.from(rawTxtDataMap.entries()).map(([core, file]) => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            const cleanStr = event.target.result.trim().replace(/\r?\n/g, ";").replace(/ +/g, ",");
                            txtFiles.set(core, cleanStr);
                            resolve();
                        };
                        reader.readAsText(file);
                    });
                });
                await Promise.all(txtPromises);
            }
        }
        if (txtFiles.size === 0 && imageFiles.size === 0 && ek5ProcessedData.size === 0) return;
        let globalBounds = { minX: Infinity, maxX: -Infinity, minZ: Infinity, maxZ: -Infinity };
        function updateBoundsFromCurve(cleanStr) {
            const points = parsePointsToObjects(cleanStr);
            for (const p of points) {
                if (p.x < globalBounds.minX) globalBounds.minX = p.x;
                if (p.x > globalBounds.maxX) globalBounds.maxX = p.x;
                if (p.y < globalBounds.minZ) globalBounds.minZ = p.y;
                if (p.y > globalBounds.maxZ) globalBounds.maxZ = p.y;
            }
        }
        for (const [core, cleanStr] of txtFiles.entries()) {
            updateBoundsFromCurve(cleanStr);
        }
        for (const [core, data] of ek5ProcessedData.entries()) {
            updateBoundsFromCurve(data.curve);
        }
        for (const [core, cleanStr] of txtFiles.entries()) {
            const scaledCurveString = mapCurveStringWithAspectRatio(cleanStr, globalBounds);
            const matchingImageBlob = imageFiles.get(core);
            if (matchingImageBlob) {
                lastLoadedCurveString = scaledCurveString;
                FileParsers.handleRasterImage(matchingImageBlob, scaledCurveString);
                console.log(`[SUCCESS] ${core}: image and track paired: `);
            } else {
                console.log(`[INFO] "${core}.txt" has no image.`);
                if (typeof debugCurveStringAsLine === 'function') {
                    debugCurveStringAsLine(scaledCurveString);
                }
            }
        }
        for (const [core, data] of ek5ProcessedData.entries()) {
            const scaledCurveString = mapCurveStringWithAspectRatio(data.curve, globalBounds);
            lastLoadedCurveString = scaledCurveString;
            applyNewData(data.img, scaledCurveString);
            console.log(`[SUCCESS] ${core} loaded`);
        }
        // --- when no pairs ---
        for (const [core, imgBlob] of imageFiles.entries()) {
            if (!txtFiles.has(core) && !ek5ProcessedData.has(core)) {
                const defaultStr = "-2," + img_z + ";2," + img_z;
                img_z += 0.2;
                lastLoadedCurveString = defaultStr;
                FileParsers.handleRasterImage(imgBlob, defaultStr);
                console.log(`[DEFAULT] ${core}: placed at Z: ${img_z - 0.2}`);
            }
        }

    } catch (error) {
        console.error("Loader error:", error);
    }
});

async function loadTgzFromUrl(urlString) {
    if (!urlString) return;
    var oldValue = document.getElementById("loadExample").value;
    document.getElementById("loadExample").value = "Loading ...";
    try {
        console.log(`[URL] Pobieranie archiwum: ${urlString}`);
        const response = await fetch(urlString);
        if (!response.ok) throw new Error(`HTTP Status: ${response.status}`);
        const archiveBuffer = await response.arrayBuffer();
        const unzippedBuffer = await gunzip(archiveBuffer);
        const extractedFiles = untar(unzippedBuffer);
        const dataTransfer = new DataTransfer();
        for (const extFile of extractedFiles) {
            let mimeType = "application/octet-stream";
            if (extFile.name.endsWith('.txt')) {
                mimeType = "text/plain";
            } else if (extFile.name.endsWith('.png')) {
                mimeType = "image/png";
            } else if (extFile.name.endsWith('.jpg') || extFile.name.endsWith('.jpeg')) {
                mimeType = "image/jpeg";
            } else {
            	mimeType = 'application/octet-stream';
            }
            const fileObj = new File([extFile.arrayBuffer], extFile.name, { type: mimeType });
            dataTransfer.items.add(fileObj);
        }
        if (dataTransfer.files.length === 0) {
            console.warn("[URL] Archive is empty.");
            return;
        }
        const mockEvent = {
            target: {
                files: dataTransfer.files // FileList
            }
        };
        console.log(`[URL] Success. Extracted ${dataTransfer.files.length} files.`);
        const fileInput = document.getElementById('imageLoader');
        if (fileInput) {
            fileInput.files = dataTransfer.files; 
        }
	fileInput.dispatchEvent(new Event('change'));
    } catch (error) {
        console.error("[URL Error]:", error);
    }
    document.getElementById("loadExample").value=oldValue;
}
window.loadTgzFromUrl = loadTgzFromUrl;
